name: gcp-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - gcp

permissions:
  contents: read
  id-token: write
  packages: write
env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository_owner }}
  IMAGE_NAME: wilcozijnsuperhippecooleapp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Index.html
        run: |
          mkdir dist && echo "<html><body><h1>Hello, World from bucket!</h1></body></html>" > dist/index.html

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push rejot-cli image
      - name: Extract metadata for rejot-cli image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push rejot-cli image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: apps/wilcozijnsuperhippecooleapp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          service_account: github-actions@rejot-staging-aac662ad.iam.gserviceaccount.com # The value from service_account_email of the github_actions module
          workload_identity_provider: projects/181101353198/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider # The value from workload_identity_pool_provider_name of the github_actions module
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Upload to GCS
        run: gsutil -m rsync -r ./dist/ gs://3d43e4f791c8755c-yeet-frontend/ # The bucket name is the value from bucket_name of your module
      - name: Deploy to Cloud Run
        run:
          gcloud run deploy yeet-api --image docker.io/nginxdemos/hello:latest --region us-central1
      - name: Deploy to Cloud Run
        run:
          # Deploy previous build, with sha tag. We need to use a custom registry, because gcp ):
          # Change rejot-staging-aac662ad to the actual project id.
          gcloud run deploy yeet-web --image
          us-central1-docker.pkg.dev/rejot-staging-aac662ad/ghcr/${{ env.REPOSITORY }}/${{
          env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} --region us-central1
